name: Code Review Request

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  issues: write
  contents: read

jobs:
  review-request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create Review Request Issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const isPR = context.eventName === 'pull_request';

            let title, body, link;

            if (isPR) {
              const pr = context.payload.pull_request;
              title = `🔍 Code Review — PR #${pr.number}: ${pr.title}`;
              link = pr.html_url;
              body = `## Pull Request Review Request

**PR:** [#${pr.number}](${link})
**Author:** @${pr.user.login}
**Branch:** \`${pr.head.ref}\` → \`${pr.base.ref}\`
**Commits:** ${pr.commits}
**Additions:** +${pr.additions} / **Deletions:** -${pr.deletions}
`;
            } else {
              const commit = context.payload.head_commit;
              const shortSha = commit.id.substring(0, 7);
              title = `🔍 Code Review — ${shortSha}: ${commit.message.split('\\n')[0].substring(0, 80)}`;
              link = commit.url;
              const filesChanged = commit.modified.length + commit.added.length + commit.removed.length;
              body = `## Push Review Request

**Commit:** [${shortSha}](${link})
**Author:** @${commit.author.username}
**Branch:** \`${context.ref.replace('refs/heads/', '')}\`
**Files changed:** ${filesChanged}
`;

              if (commit.modified.length > 0) {
                body += `\n### Modified (${commit.modified.length})\n${commit.modified.map(f => `- \`${f}\``).join('\\n')}`;
              }
              if (commit.added.length > 0) {
                body += `\n### Added (${commit.added.length})\n${commit.added.map(f => `- \`${f}\``).join('\\n')}`;
              }
              if (commit.removed.length > 0) {
                body += `\n### Removed (${commit.removed.length})\n${commit.removed.map(f => `- \`${f}\``).join('\\n')}`;
              }
            }

            body += `\n---\n> 🤖 Automated review request. An AI agent will review the changes and file issues for any problems found.`;

            const issue = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['code-review'],
            });

            console.log(`Created review issue #${issue.data.number}: ${issue.data.html_url}`);

            // If this is a PR, also add a comment linking to the review issue
            if (isPR) {
              const prNumber = context.payload.pull_request.number;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: `🔍 Code review requested → #${issue.data.number}`,
              });
            }
